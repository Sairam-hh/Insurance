<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>404 — Page Not Found | SecureShield</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
:root{--navy:#0a1f44;--royal:#1e40af;--blue:#2563eb;--grad:linear-gradient(135deg,#0a1f44,#1e40af,#2563eb)}
body{min-height:100vh;background:var(--grad);display:flex;align-items:center;justify-content:center;padding:24px;color:#fff;position:relative;overflow:hidden;text-align:center}
a{text-decoration:none;color:inherit}
.shape{position:absolute;border-radius:50%;background:rgba(255,255,255,.07);filter:blur(50px);animation:f 8s infinite}
.shape.a{width:500px;height:500px;top:-150px;left:-150px}
.shape.b{width:400px;height:400px;bottom:-150px;right:-150px;animation-delay:2s}
.shape.c{width:200px;height:200px;top:30%;right:20%;animation-delay:4s}
@keyframes f{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}

.card{position:relative;z-index:1;max-width:640px;background:rgba(255,255,255,.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.18);padding:60px 40px;border-radius:30px;box-shadow:0 30px 80px rgba(0,0,0,.3)}
.logo{display:inline-flex;align-items:center;gap:10px;font-weight:800;font-size:20px;margin-bottom:30px}
.logo i{background:rgba(255,255,255,.18);width:40px;height:40px;border-radius:12px;display:grid;place-items:center}

.bignum{font-size:clamp(7rem,18vw,11rem);font-weight:900;line-height:1;background:linear-gradient(90deg,#fff,#38bdf8);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-6px;animation:pop 1s ease-out;position:relative}
.bignum::after{content:'';position:absolute;left:0;right:0;bottom:-10px;height:6px;background:linear-gradient(90deg,transparent,#38bdf8,transparent);animation:slide 2s infinite}
@keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes slide{0%{transform:translateX(-50%)}100%{transform:translateX(50%)}}

.icon-circle{width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.12);display:grid;place-items:center;font-size:36px;margin:0 auto 24px;color:#38bdf8;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(56,189,248,.4)}50%{box-shadow:0 0 0 18px rgba(56,189,248,0)}}

h1{font-size:2rem;margin:14px 0 10px;font-weight:800}
p{opacity:.85;line-height:1.7;margin-bottom:28px;font-size:1.02rem}
.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{padding:13px 26px;border-radius:12px;font-weight:600;font-size:14.5px;display:inline-flex;align-items:center;gap:10px;transition:.3s;cursor:pointer;border:none}
.btn-w{background:#fff;color:var(--navy)}
.btn-w:hover{transform:translateY(-3px);box-shadow:0 12px 28px rgba(0,0,0,.2)}
.btn-o{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.4)}
.btn-o:hover{background:rgba(255,255,255,.12)}

.links{margin-top:30px;padding-top:24px;border-top:1px solid rgba(255,255,255,.15);font-size:14px;opacity:.85}
.links a{margin:0 8px;color:#38bdf8;font-weight:500}
.links a:hover{text-decoration:underline}
</style></head><body>
<div class="shape a"></div><div class="shape b"></div><div class="shape c"></div>
<div class="card">
<div class="logo"> STACKLY</div>
<div class="bignum">404</div>
<div class="icon-circle" style="margin-top:30px"><i class="fas fa-compass"></i></div>
<h1>Oops! Page Not Found</h1>
<p>The page you're looking for doesn't exist, was moved, or is temporarily unavailable. Let's get you back on track.</p>
<div class="actions">
<a href="index.html" class="btn btn-w"><i class="fas fa-house"></i> Go Home</a>
<a href="contact.html" class="btn btn-o"><i class="fas fa-headset"></i> Contact Support</a>
</div>
<div class="links">
Or explore: <a href="services.html">Services</a> · <a href="plans.html">Plans</a> · <a href="claims.html">Claims</a> · <a href="about.html">About</a>
</div></div></body></html>
